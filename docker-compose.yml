# Production ERPNext stack for Dokploy.
#
# Networking fixes baked in (see RUNBOOK for full explanation):
#   1. --skip-name-resolve on MariaDB  → no reverse-DNS stalls on connect
#   2. Static IPs + extra_hosts        → bypasses Docker embedded DNS (EAI_AGAIN)
#   3. dns_opt                         → TCP DNS + avoids A/AAAA race
#   4. traefik.docker.network label    → forces Traefik to use the routable network
#
# Required env vars (set in Dokploy):
#   IMAGE_NAME, VERSION, SITE_NAME, ADMIN_PASSWORD, DB_ROOT_PASSWORD,
#   TRAEFIK_NETWORK (the Dokploy compose project network name)
#
# Feature-flag env vars (drive one-shot services):
#   ENABLE_DB=1          always
#   CONFIGURE=1          first deploy + whenever you add an app, then 0
#   CREATE_SITE=1        first deploy only, then 0
#   MIGRATE=0            run bench migrate manually instead
#   REGENERATE_APPS_TXT=1  when you add a new app, then 0

x-custom-image: &custom_image
  image: ${IMAGE_NAME:-ghcr.io/steven-baron/erpnext-crm}:${VERSION:-16}
  pull_policy: ${PULL_POLICY:-always}
  dns_opt:
    - use-vc
    - single-request-reopen
  extra_hosts:
    - "db:${NET_PREFIX:-10.89.0}.10"
    - "redis-cache:${NET_PREFIX:-10.89.0}.11"
    - "redis-queue:${NET_PREFIX:-10.89.0}.12"
    - "redis-socketio:${NET_PREFIX:-10.89.0}.13"
    - "backend:${NET_PREFIX:-10.89.0}.20"
    - "websocket:${NET_PREFIX:-10.89.0}.21"
  deploy:
    restart_policy:
      condition: always

services:
  backend:
    <<: *custom_image
    environment:
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-8}"
      GUNICORN_THREADS: "${GUNICORN_THREADS:-4}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-150}"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      bench-network:
        ipv4_address: ${NET_PREFIX:-10.89.0}.20
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:8000"]
      interval: 2s
      timeout: 10s
      retries: 30

  frontend:
    <<: *custom_image
    command: ["nginx-entrypoint.sh"]
    # Force Traefik to reach this container via the project's routable network,
    # not bench-network (which Traefik can't reach). Set TRAEFIK_NETWORK to the
    # Dokploy compose project name shown by: docker compose ls
    labels:
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: "${FRAPPE_SITE_NAME_HEADER:-}"
      PROXY_READ_TIMEOUT: "${PROXY_READ_TIMEOUT:-150}"
      CLIENT_MAX_BODY_SIZE: "${CLIENT_MAX_BODY_SIZE:-50m}"
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:8080"]
      interval: 2s
      timeout: 30s
      retries: 30

  websocket:
    <<: *custom_image
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      bench-network:
        ipv4_address: ${NET_PREFIX:-10.89.0}.21
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:9000"]
      interval: 2s
      timeout: 10s
      retries: 30

  queue-default:
    <<: *custom_image
    command: ["bench", "worker", "--queue", "default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - bench-network

  queue-long:
    <<: *custom_image
    command: ["bench", "worker", "--queue", "long"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - bench-network

  queue-short:
    <<: *custom_image
    command: ["bench", "worker", "--queue", "short"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - bench-network

  scheduler:
    <<: *custom_image
    command: ["bench", "schedule"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks:
      - bench-network

  configurator:
    <<: *custom_image
    deploy:
      mode: replicated
      replicas: ${CONFIGURE:-0}
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - >
        [[ $${REGENERATE_APPS_TXT} == "1" ]] && ls -1 apps > sites/apps.txt;
        [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && exit 0;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
      REGENERATE_APPS_TXT: "${REGENERATE_APPS_TXT:-0}"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network

  create-site:
    <<: *custom_image
    deploy:
      mode: replicated
      replicas: ${CREATE_SITE:-0}
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 $$DB_HOST:$$DB_PORT;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for common_site_config.json…";
          sleep 5;
          if (( `date +%s`-start > 120 )); then echo "timeout"; exit 1; fi
        done;
        [[ -d "sites/$${SITE_NAME}" ]] && echo "$${SITE_NAME} already exists" && exit 0;
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=$${ADMIN_PASSWORD} --db-root-username=root --db-root-password=$${DB_ROOT_PASSWORD} $${INSTALL_APP_ARGS} $${SITE_NAME};
    environment:
      SITE_NAME: ${SITE_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: "${DB_PORT:-3306}"
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      INSTALL_APP_ARGS: ${INSTALL_APP_ARGS:-}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network

  migration:
    <<: *custom_image
    deploy:
      mode: replicated
      replicas: ${MIGRATE:-0}
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - >
        bench --site all set-config -p maintenance_mode 1;
        bench --site all set-config -p pause_scheduler 1;
        bench --site all migrate;
        bench --site all set-config -p maintenance_mode 0;
        bench --site all set-config -p pause_scheduler 0;
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network

  db:
    image: mariadb:10.6
    deploy:
      mode: replicated
      replicas: ${ENABLE_DB:-1}
      restart_policy:
        condition: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      - --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      bench-network:
        ipv4_address: ${NET_PREFIX:-10.89.0}.10
    healthcheck:
      test: mysqladmin ping -h localhost --password=${DB_ROOT_PASSWORD}
      interval: 1s
      retries: 20

  redis-cache:
    image: redis:6.2-alpine
    deploy:
      restart_policy:
        condition: always
    volumes:
      - redis-cache-data:/data
    networks:
      bench-network:
        ipv4_address: ${NET_PREFIX:-10.89.0}.11
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis-queue:
    image: redis:6.2-alpine
    deploy:
      restart_policy:
        condition: always
    volumes:
      - redis-queue-data:/data
    networks:
      bench-network:
        ipv4_address: ${NET_PREFIX:-10.89.0}.12
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis-socketio:
    image: redis:6.2-alpine
    deploy:
      restart_policy:
        condition: always
    volumes:
      - redis-socketio-data:/data
    networks:
      bench-network:
        ipv4_address: ${NET_PREFIX:-10.89.0}.13
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:
  sites:
    driver_opts:
      type: "${SITE_VOLUME_TYPE:-}"
      o: "${SITE_VOLUME_OPTS:-}"
      device: "${SITE_VOLUME_DEV:-}"

networks:
  bench-network:
    ipam:
      config:
        - subnet: ${NET_PREFIX:-10.89.0}.0/24
