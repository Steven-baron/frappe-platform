name: Build apps image

# Builds the thin apps layer on top of erpnext-crm:base-16.
# Adds every app in apps-custom.json (~1-2 min build time).
#
# Triggers:
#   - Push to main that touches apps-custom.json, Dockerfile, or scripts/
#   - repository_dispatch from an app repo (payload: { "sha": "<commit-sha>" })
#   - Manual workflow_dispatch
#
# Tag: ghcr.io/steven-baron/erpnext-crm:16  (what Dokploy uses)

on:
  push:
    branches: [main]
    paths:
      - apps-custom.json
      - Dockerfile
      - scripts/**
      - .github/workflows/build-apps.yml
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASENAME: erpnext-crm
  DEFAULT_TAG: "16"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve APPS_SHA
        id: sha
        # APPS_SHA busts the Docker cache so the custom apps are re-cloned fresh.
        # - repository_dispatch: use the app repo's commit SHA from the payload
        # - push / manual: use the unique run id (always re-clones)
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "apps_sha=${{ github.event.client_payload.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "apps_sha=run-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image name
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${owner}/${{ env.IMAGE_BASENAME }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push apps image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APPS_SHA=${{ steps.sha.outputs.apps_sha }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ env.DEFAULT_TAG }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### ✅ Apps image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.meta.outputs.image }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "APPS_SHA: \`${{ steps.sha.outputs.apps_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
