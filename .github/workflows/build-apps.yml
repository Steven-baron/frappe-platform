name: Build apps image

# Builds the thin apps layer on top of erpnext-crm:base-16.
# Adds every app in apps-custom.json (~1-2 min build time).
#
# Triggers:
#   - Push to main that touches apps-custom.json, Dockerfile, or scripts/
#   - repository_dispatch from an app repo (payload: { "sha": "<commit-sha>" })
#   - Manual workflow_dispatch
#
# Tag: ghcr.io/steven-baron/erpnext-crm:16  (what Dokploy uses)

on:
  push:
    branches: [main]
    paths:
      - apps-custom.json
      - Dockerfile
      - scripts/**
      - .github/workflows/build-apps.yml
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASENAME: erpnext-crm
  DEFAULT_TAG: "16"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve APPS_SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # App repo sent its own commit SHA — use it to bust the clone cache
            echo "apps_sha=${{ github.event.client_payload.sha }}" >> "$GITHUB_OUTPUT"
          else
            # Fetch the current HEAD SHA for each app branch listed in apps-custom.json
            python3 - << 'EOF'
import json, subprocess, hashlib, os

apps = json.load(open("apps-custom.json"))
combined = ""
for app in apps:
    url = app["url"]
    branch = app.get("branch", "main")
    result = subprocess.run(
        ["git", "ls-remote", url, f"refs/heads/{branch}"],
        capture_output=True, text=True
    )
    sha = result.stdout.split()[0] if result.stdout.strip() else "unknown"
    print(f"{url}@{branch}: {sha}")
    combined += sha

digest = hashlib.sha256(combined.encode()).hexdigest()[:12]
with open(os.environ["GITHUB_OUTPUT"], "a") as f:
    f.write(f"apps_sha={digest}\n")
print(f"combined SHA: {digest}")
EOF
          fi

      - name: Resolve image name
        id: meta
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${{ env.REGISTRY }}/${owner}/${{ env.IMAGE_BASENAME }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push apps image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APPS_SHA=${{ steps.sha.outputs.apps_sha }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ env.DEFAULT_TAG }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### ✅ Apps image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.meta.outputs.image }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "APPS_SHA: \`${{ steps.sha.outputs.apps_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
